name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 0.1.0). Ignored on release events."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  # ---- 1. resolve the version exactly once from the tag (or manual input)
  resolve:
    name: resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            raw="${{ github.event.release.tag_name }}"
          else
            raw="${{ inputs.version }}"
          fi
          if [[ -z "$raw" ]]; then
            echo "error: no version could be resolved" >&2
            exit 1
          fi
          version="${raw#refs/tags/}"
          version="${version#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $version"

  # ---- 2. build wheels per platform (each calls scripts/set-version.sh first)
  linux:
    name: wheels-linux-${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Set version
        run: scripts/set-version.sh "${{ needs.resolve.outputs.version }}"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: "true"
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  musllinux:
    name: wheels-musllinux-${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Set version
        run: scripts/set-version.sh "${{ needs.resolve.outputs.version }}"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: "true"
          manylinux: musllinux_1_2
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-musllinux-${{ matrix.target }}
          path: dist

  macos:
    name: wheels-macos-${{ matrix.target }}
    runs-on: macos-latest
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Set version
        run: scripts/set-version.sh "${{ needs.resolve.outputs.version }}"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: "true"
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  windows:
    name: wheels-windows-${{ matrix.target }}
    runs-on: windows-latest
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        target: [x64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: ${{ matrix.target }}
      - name: Set version
        shell: bash
        run: scripts/set-version.sh "${{ needs.resolve.outputs.version }}"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: "true"
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    needs: resolve
    steps:
      - uses: actions/checkout@v4
      - name: Set version
        run: scripts/set-version.sh "${{ needs.resolve.outputs.version }}"
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  # ---- 3. publish (release events only)
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    needs: [resolve, linux, musllinux, macos, windows, sdist]
    environment:
      name: pypi
      url: https://pypi.org/p/orxml
    permissions:
      # IMPORTANT: this permission is required for trusted publishing.
      id-token: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true
      - name: List artifacts
        run: ls -lh dist
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No `password:` — trusted publishing via OIDC. Project must be
        # configured on PyPI to accept this workflow; see README.
